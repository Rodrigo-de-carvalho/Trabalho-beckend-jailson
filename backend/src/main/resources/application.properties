# ============================================================
#  CONFIGURAÇÃO DO BANCO DE DADOS (MySQL local)
# ============================================================
# IMPORTANTE: ajuste o usuário e a senha abaixo de acordo com o
# MySQL instalado no PC onde o projeto vai rodar (no laboratório/apresentação).

# Endereco do banco: localhost (mesmo PC), porta 3306 (padrao do MySQL),
# banco "clinica_odontologica" (o mesmo criado pelo schema.sql).
# Os parametros depois do "?" evitam erros comuns de conexao/timezone.
spring.datasource.url=jdbc:mysql://localhost:3306/clinica_odontologica?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo

# Usuario do MySQL (uso o root mesmo, no meu PC).
spring.datasource.username=root

# Senha do banco. Não deixo fixa aqui pra não ficar salva no Git — pego da
# variável de ambiente DB_PASSWORD (e se não tiver nenhuma, assume vazia).
spring.datasource.password=${DB_PASSWORD:}

# Driver oficial do MySQL (a "ponte" entre o Java e o banco).
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
#  CONFIGURAÇÃO DO JPA / HIBERNATE
# ============================================================
# "update" = o Hibernate compara as entidades Java com as tabelas e cria o que
# estiver faltando, SEM apagar dados. Como rodamos o schema.sql antes, as tabelas
# já existem; aqui ele só confere. (Para um trabalho de faculdade é o mais seguro.)
spring.jpa.hibernate.ddl-auto=update

# Mostra no console o SQL que o Hibernate executa (ótimo para a apresentação,
# dá pra mostrar pro professor as queries acontecendo de verdade).
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Informa qual "dialeto" de SQL usar (cada banco tem o seu; aqui é o do MySQL).
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================================
#  CONFIGURAÇÃO DO SERVIDOR
# ============================================================
# Porta onde a API vai rodar. O frontend (React) chama http://localhost:8080/api
server.port=8080

# ============================================================
#  CONFIGURAÇÃO LOCAL (NÃO VAI PRO GIT)
# ============================================================
# Se existir um application-local.properties do lado deste arquivo, ele é
# carregado por cima e pode sobrescrever a senha do banco com a minha senha
# real, sem precisar digitar nada na hora de rodar. "optional:" faz o Spring
# não dar erro se o arquivo não existir (ex: na máquina do professor).
spring.config.import=optional:application-local.properties
